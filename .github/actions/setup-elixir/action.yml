name: "Setup Elixir"
description: "Sets up Elixir and caches Mix dependencies"

inputs:
  elixir-version:
    description: "Elixir version"
    required: true
    default: "1.19.5"
  otp-version:
    description: "OTP version"
    required: true
    default: "28.4.1"

runs:
  using: "composite"
  steps:
    - name: Setup BEAM
      uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ inputs.elixir-version }}
        otp-version: ${{ inputs.otp-version }}

    - name: Restore dependency cache
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ inputs.otp-version }}-${{ inputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ inputs.otp-version }}-${{ inputs.elixir-version }}-

    - name: Install dependencies
      shell: bash
      run: mix deps.get
